services:
  - type: web
    name: n8n-philips-smart-system
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: GENERIC_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"
      
      # KẾT NỐI DATABASE VĨNH CỬU (Thay bằng thông tin từ Supabase của anh)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_HOST
        value: db.xxxx.supabase.co # <--- THAY HOST CỦA ANH VÀO ĐÂY
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        value: mat-khau-cua-anh # <--- THAY PASSWORD CỦA ANH VÀO ĐÂY

      # CẤU HÌNH WEBHOOK (Sau khi deploy xong Render anh mới quay lại sửa link này)
      - key: WEBHOOK_URL
        sync: false
      - key: N8N_HOST
        sync: false
